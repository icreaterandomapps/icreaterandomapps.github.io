<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family: "Segoe UI", sans-serif;

            background: linear-gradient(#eef5fd, #d4e4f7);
        }

        .box {
            text-align: center;

            padding: 40px 60px;

            background: linear-gradient(
                to bottom,
                #ffffff,
                #eef6ff 50%,
                #d9eafc 51%,
                #c8dcf4
            );

            border: 1px solid #8fb1d9;
            border-radius: 10px;

            box-shadow:
                inset 0 1px rgba(255,255,255,.9),
                0 2px 8px rgba(0,0,0,.18);
        }

        h1 {
            margin: 0 0 10px;
            color: #2f3c4b;
        }

        p {
            margin: 0;
            color: #4d647d;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🎉 GitHub Pages Works!</h1>
    <p>If you can see this page, your website is working correctly.</p>
</div>

</body>
</html>
